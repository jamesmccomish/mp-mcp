name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Lint and typecheck are runtime-agnostic, so they run once (not per-runtime).
  quality:
    name: quality (lint + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Apps import the built `mp-mcp` package (resolved via its dist/ exports),
      # so the packages must be built before the apps typecheck can resolve them.
      - name: Build packages
        run: pnpm build

      - name: Typecheck apps
        run: pnpm -r --filter=./apps/* typecheck

  # Tests and build run under both runtimes to verify the published package works
  # on Node and Bun.
  test:
    name: test — ${{ matrix.runtime }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [node, bun]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node 22
        if: matrix.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
